name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "from forge import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version-check
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: macos-x64
            os: macos-13
          - target: macos-arm64
            os: macos-latest
          - target: windows-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyinstaller
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: forge/plugin/opencode
      - run: npm run build
        working-directory: forge/plugin/opencode
      - name: Build release bundle
        run: PYTHONPATH=. python scripts/build_release.py --version "${{ needs.version-check.outputs.version }}"
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ needs.version-check.outputs.version }}-${{ matrix.target }}
          path: |
            dist/forge-${{ needs.version-check.outputs.version }}-${{ matrix.target }}.tar.gz
            dist/forge-${{ needs.version-check.outputs.version }}-${{ matrix.target }}.sha256
      - name: Upload installers (linux-x64 only)
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            scripts/install.sh
            scripts/install.ps1
      - name: Smoke test install (Unix)
        if: matrix.target != 'windows-x64'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/forge-smoke"
          tar xzf dist/forge-*.tar.gz -C "$RUNNER_TEMP/forge-smoke"
          EXE=$(find "$RUNNER_TEMP/forge-smoke" -name forge -type f | head -1)
          if [ -z "$EXE" ] || [ ! -f "$EXE" ]; then
            echo "ERROR: forge executable not found in archive"
            exit 1
          fi
          chmod +x "$EXE"
          export FORGE_PROGRAM="$RUNNER_TEMP/forge-test-program"
          export OPENCODE_CONFIG_DIR="$RUNNER_TEMP/forge-test-config"
          "$EXE" version
          "$EXE" install
          "$EXE" doctor
          "$EXE" uninstall

      - name: Smoke test install (Windows)
        if: matrix.target == 'windows-x64'
        shell: pwsh
        run: |
          $tmp = "$env:RUNNER_TEMP\forge-smoke"
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          tar xzf dist/forge-*.tar.gz -C $tmp
          $exe = Get-ChildItem -Path $tmp -Recurse -Filter "forge.exe" -File | Select-Object -First 1
          if (-not $exe) {
            Write-Error "ERROR: forge.exe not found in archive"
            exit 1
          }
          $env:FORGE_PROGRAM = "$env:RUNNER_TEMP\forge-test-program"
          $env:OPENCODE_CONFIG_DIR = "$env:RUNNER_TEMP\forge-test-config"
          & $exe.FullName version
          & $exe.FullName install
          & $exe.FullName doctor
          & $exe.FullName uninstall

  publish:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Verify complete matrix
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          TARGETS=(linux-x64 linux-arm64 macos-x64 macos-arm64 windows-x64)
          for target in "${TARGETS[@]}"; do
            name="forge-${VERSION}-${target}"
            if [ ! -f "artifacts/${name}/${name}.tar.gz" ]; then
              echo "Missing: ${name}"
              exit 1
            fi
          done
          echo "All targets present"
      - name: Stage release files
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          mkdir -p release
          cp artifacts/*/*.tar.gz release/
          cp artifacts/*/*.sha256 release/
          cp artifacts/installers/install.sh release/
          cp artifacts/installers/install.ps1 release/
          echo "${VERSION}" > release/latest.txt
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release/*.tar.gz
            release/*.sha256
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          files: release/*
